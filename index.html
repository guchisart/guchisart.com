<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUCHISART | Design Studio</title>
    <!-- Importamos la tipografía de impacto -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --font-bold: 'Archivo Black', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            font-family: var(--font-body); 
            margin: 0; 
            line-height: 1.2; 
        }
        
        /* NAVEGACIÓN: Logo a la derecha y Links a la izquierda */
        nav { 
            padding: 2rem 5%; 
            display: flex; 
            flex-direction: row-reverse; /* ESTO MUEVE EL LOGO A LA DERECHA */
            justify-content: space-between; 
            align-items: center;
            position: sticky; 
            top: 0; 
            background: rgba(0,0,0,0.9);
            z-index: 100;
        }

        .logo { 
            font-family: var(--font-bold); 
            font-size: 1.2rem; 
            text-decoration: none; 
            color: white; 
            text-transform: lowercase;
        }

        nav .links a { 
            color: white; 
            margin-right: 25px; 
            text-decoration: none; 
            font-size: 0.8rem; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
        }

        /* TÍTULOS GRANDES */
        header { 
            height: 70vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            padding: 0 10%; 
        }

        h1 { 
            font-family: var(--font-bold); 
            font-size: clamp(4rem, 12vw, 9rem); 
            margin: 0;
            line-height: 0.85;
        }

        section { padding: 100px 10%; border-top: 1px solid #1a1a1a; }
        
        h2 { 
            font-family: var(--font-bold); 
            font-size: clamp(2.5rem, 6vw, 5rem); 
            margin-bottom: 40px;
            line-height: 0.9;
        }

        /* SECCIÓN CONTACTO ESTILO HH GLOBAL */
        .contacto-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
        }

        .contacto-title-pile h2 {
            font-size: 5rem;
            line-height: 0.8;
            margin: 0;
            opacity: 0.9;
        }

        /* FORMULARIO */
        form { display: flex; flex-direction: column; gap: 15px; }
        input, select, textarea {
            background: transparent;
            border: 1px solid #333;
            padding: 18px;
            color: white;
            font-family: var(--font-body);
        }

        button {
            background: white;
            color: black;
            border: none;
            padding: 20px;
            font-family: var(--font-bold);
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 10px;
        }

        /* PIE DE PÁGINA */
        footer { padding: 60px 10%; border-top: 1px solid #1a1a1a; color: #444; }

        @media (max-width: 768px) {
            .contacto-container { grid-template-columns: 1fr; }
            h1 { font-size: 4rem; }
        }
    </style>
</head>
<body>

    <nav>
        <!-- El logo sale a la derecha por el CSS -->
        <a href="#" class="logo">guchisart</a>
        
        <div class="links">
            <a href="#productos">Trabajos</a>
            <a href="#sobre-mi">Estudio</a>
            <a href="#contacto">Contacto</a>
        </div>
    </nav>

    <header>
        <h1>Guchisart<br>Creative.</h1>
        <p style="color: #666; margin-top: 20px; font-size: 1.1rem;">Graphic Design | Based in Madrid</p>
    </header>

    <section id="productos">
        <h2>Selected<br>Works</h2>
        <p style="color: #888;">[ Aquí irán tus fotos de láminas ]</p>
    </section>

    <section id="contacto">
        <div class="contacto-container">
            <div class="contacto-title-pile">
                <h2>Contacto</h2>
                <h2>Correo</h2>
                <h2 style="font-family: serif; font-style: italic; font-weight: normal;">Contact</h2>
            </div>
            
            <div class="form-side">
                <form>
                    <input type="text" placeholder="Nombre">
                    <input type="email" placeholder="Email">
                    <textarea placeholder="¿En qué puedo ayudarte?" rows="4"></textarea>
                    <button type="submit">Enviar Solicitud</button>
                </form>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Guchisart Studio</p>
    </footer>

</body>
</html>
